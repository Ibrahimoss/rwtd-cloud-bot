name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r docker/bot/requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check bot/ monitoring/ scripts/

      - name: Run tests
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build bot image
        run: docker build -f docker/bot/Dockerfile -t rwtd-bot:ci .

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check
      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
